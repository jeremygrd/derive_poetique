<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dérive Poétique — autonome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #0d0b0a;
      --panel: #151210;
      --panel-2: #1a1612;
      --border: #2c251d;
      --text: #e8e0d4;
      --muted: #8b7f6f;
      --gold: #c9a96e;
      --gold-2: #d8ba86;
      --error-bg: #201010;
      --error-border: #5a2525;
      --error-text: #e2a1a1;
      --ok-bg: #122013;
      --ok-border: #28452a;
      --ok-text: #9ed39f;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
      line-height: 1.5;
    }
    header {
      padding: 28px 32px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #151210, #0d0b0a);
    }
    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      letter-spacing: .14em;
      text-transform: uppercase;
      font-size: 12px;
      font-style: italic;
    }
    .main {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 22px 60px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 22px;
    }
    .lbl {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .18em;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      padding: 18px 18px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #120f0d;
      color: var(--text);
      font-size: 17px;
      line-height: 1.75;
      font-family: inherit;
      outline: none;
    }
    textarea:focus, input[type="range"]:focus {
      box-shadow: 0 0 0 2px rgba(201,169,110,.15);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 22px;
    }
    @media (max-width: 780px) {
      .grid { grid-template-columns: 1fr; }
    }
    .slider-group { margin-bottom: 16px; }
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 8px;
    }
    .slider-label {
      color: #c7bbab;
      font-size: 14px;
      font-weight: 600;
    }
    .slider-value {
      color: var(--gold);
      font-size: 14px;
      font-family: 'Courier New', monospace;
    }
    .slider-value em { color: #9d8a6d; }
    input[type=range] {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: #2b241d;
      height: 4px;
      border-radius: 999px;
      cursor: pointer;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid #0f0c0a;
    }
    input[type=range]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid #0f0c0a;
    }
    .slider-ticks {
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
      color: #625646;
      font-size: 10px;
      letter-spacing: .11em;
      text-transform: uppercase;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }
    .btn {
      border: none;
      border-radius: 5px;
      padding: 12px 22px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      transition: transform .15s ease, opacity .15s ease;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--gold); color: #0b0908; }
    .btn-secondary { background: #563636; color: #f2dede; }
    .btn-ghost { background: #211c17; color: #d4c2a5; border: 1px solid var(--border); }
    .cb {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .info, .error, .progress, .statusline {
      border-radius: 6px;
      border: 1px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .info {
      background: #111610;
      border-color: #283423;
      color: #a1c192;
      font-size: 13px;
    }
    .info code {
      background: #191613;
      border-radius: 4px;
      padding: 2px 5px;
      font-family: 'Courier New', monospace;
      color: #e7d7bc;
    }
    .error {
      display: none;
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
      font-size: 14px;
    }
    .progress {
      display: none;
      background: #19150f;
      color: var(--gold-2);
      font-size: 14px;
    }
    .progress-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #3a3127;
      border-top-color: var(--gold);
      animation: spin .8s linear infinite;
      flex: 0 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mini-bar {
      width: 100%;
      height: 7px;
      background: #2b241d;
      border-radius: 999px;
      overflow: hidden;
    }
    .mini-bar > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #87693c, var(--gold));
      transition: width .25s ease;
    }
    .statusline {
      display: none;
      background: var(--ok-bg);
      border-color: var(--ok-border);
      color: var(--ok-text);
      font-size: 13px;
      line-height: 1.6;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .results-title {
      font-size: 18px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0;
      font-weight: 400;
    }
    .results-info {
      font-size: 12px;
      color: #726655;
      letter-spacing: .09em;
    }
    .pass-card {
      overflow: hidden;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel);
    }
    .pass-head {
      background: var(--panel-2);
      border-bottom: 1px solid #211c17;
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pass-num {
      color: var(--gold);
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .pass-meta {
      color: #766755;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .poem-out {
      padding: 22px 22px;
      white-space: pre-wrap;
      line-height: 1.95;
      font-size: 17px;
      font-style: italic;
    }
    .cw {
      background: rgba(201,169,110,.14);
      color: #e8c985;
      border-bottom: 1px solid rgba(201,169,110,.35);
      border-radius: 3px;
      padding: 0 3px;
      cursor: help;
    }
    details { border-top: 1px solid #211c17; }
    summary {
      cursor: pointer;
      user-select: none;
      padding: 12px 18px;
      color: #93836c;
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .changes-grid {
      padding: 6px 18px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .change-item {
      background: #1a1612;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 10px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      font-size: 13px;
    }
    .ch-orig { color: #a58d76; text-decoration: line-through; font-style: italic; }
    .ch-arrow { color: #605342; }
    .ch-repl { color: #e4c47e; font-weight: 700; }
    .small {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .pill {
      display: inline-block;
      border: 1px solid var(--border);
      background: #1a1612;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: #c7b18a;
      margin-right: 8px;
      margin-top: 6px;
    }
    .header-top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
    .lang-switch { border: 1px solid var(--border); background:#1a1612; color: var(--text); border-radius: 999px; padding: 8px 12px; cursor:pointer; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
    .lang-switch:hover { border-color: #4a3d2e; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1 id="titleText">Dérive Poétique</h1>
      </div>
      <button class="lang-switch" id="langToggleBtn" type="button" aria-label="Switch language">🇬🇧 EN</button>
    </div>
  </header>

  <div class="main">

    <div class="panel" style="margin-bottom:24px;">
      <label class="lbl" for="poemInput" id="sourceLabel">Texte source</label>
      <textarea id="poemInput">C’est un trou de verdure où chante une rivière,
Accrochant follement aux herbes des haillons
D’argent ; où le soleil, de la montagne fière,
Luit : c’est un petit val qui mousse de rayons.

Un soldat jeune, bouche ouverte, tête nue,
Et la nuque baignant dans le frais cresson bleu,
Dort ; il est étendu dans l’herbe, sous la nue,
Pâle dans son lit vert où la lumière pleut.

Les pieds dans les glaïeuls, il dort. Souriant comme
Sourirait un enfant malade, il fait un somme :
Nature, berce-le chaudement : il a froid.

Les parfums ne font pas frissonner sa narine ;
Il dort dans le soleil, la main sur sa poitrine,
Tranquille. Il a deux trous rouges au côté droit.</textarea>
    </div>

    <div class="panel">
      <div class="grid">
        <div>
          <div class="slider-group">
            <div class="slider-header">
              <span class="slider-label" id="wordsLabel">Mots à modifier</span>
              <span class="slider-value" id="pctVal">25%</span>
            </div>
            <input type="range" id="pctSlider" min="5" max="70" step="5" value="25" />
            <div class="slider-ticks"><span>5%</span><span>35%</span><span>70%</span></div>
          </div>

          <div class="slider-group">
            <div class="slider-header">
              <span class="slider-label" id="distanceLabel">Distance sémantique</span>
              <span class="slider-value" id="distVal">3/10 — <em>Proche</em></span>
            </div>
            <input type="range" id="distSlider" min="1" max="10" step="1" value="3" />
            <div class="slider-ticks"><span>quasi-synonyme</span><span>déplacé</span><span>très éloigné</span></div>
          </div>
        </div>

        <div>
          <div class="slider-group">
            <div class="slider-header">
              <span class="slider-label" id="passesLabel">Passes</span>
              <span class="slider-value" id="passVal">1</span>
            </div>
            <input type="range" id="passSlider" min="1" max="20" step="1" value="1" />
            <div class="slider-ticks"><span>1</span><span>10</span><span>20</span></div>
          </div>

          <div class="slider-group">
            <div class="slider-header">
              <span class="slider-label" id="topkLabel">Candidates par masque</span>
              <span class="slider-value" id="topKVal">24</span>
            </div>
            <input type="range" id="topKSlider" min="8" max="40" step="4" value="24" />
            <div class="slider-ticks"><span>8</span><span>24</span><span>40</span></div>
          </div>
        </div>
      </div>

      <div class="row" style="margin-top:8px;">
        <button class="btn btn-primary" id="runBtn">Lancer la dérive</button>
        <button class="btn btn-secondary hidden" id="cancelBtn">Interrompre</button>
        <button class="btn btn-ghost" id="warmupBtn">Précharger les modèles</button>
        <label class="cb"><input type="checkbox" id="diffCheck" checked /> <span id="diffLabel">Surligner les changements</span></label>
      </div>

      <div class="small" style="margin-top:14px;" id="autoLangHint">
        La langue est détectée automatiquement. Français → CamemBERT, anglais → BERT cased, autres cas → BERT multilingue.
      </div>
    </div>

    <div class="progress" id="progressBox">
      <div class="progress-head">
        <div class="spinner"></div>
        <div id="progressText">Chargement…</div>
      </div>
      <div class="mini-bar"><div id="progressBar"></div></div>
      <div class="small" id="progressSub" style="margin-top:10px; color:#b7a07b;"></div>
    </div>

    <div class="statusline" id="statusLine"></div>
    <div class="error" id="errorBox"></div>

    <div id="resultsSection" class="hidden">
      <div class="results-header">
        <h2 class="results-title" id="resultsTitle">Résultats</h2>
        <div class="results-info" id="resultsInfo"></div>
      </div>
      <div id="resultsContainer"></div>
    </div>
  </div>

  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers';

    env.allowLocalModels = false;

    const DIST_LABELS = [
      'Quasi identique', 'Très proche', 'Proche', 'Voisin', 'Décalé',
      'Tangentiel', 'Distant', 'Très distant', 'Presque surréaliste', 'Alien'
    ];

    const LANGUAGE_LABELS = {
      fr: 'français',
      en: 'anglais',
      es: 'espagnol',
      de: 'allemand',
      it: 'italien',
      pt: 'portugais',
      unknown: 'indéterminée'
    };

    const STOPWORDS = {
      fr: new Set('le la les un une des du de d au aux et ou mais donc or ni car ne pas plus sur sous dans par pour vers avec sans ce cet cette ces mon ton son ma ta sa mes tes ses notre votre leur nos vos leurs je tu il elle on nous vous ils elles me te se y en qui que quoi dont où comme si lorsqu alors puis ainsi très trop peu ici là entre parmi chaque tout toute tous toutes être avoir'.split(/\s+/)),
      en: new Set('the a an and or but if then than that this these those of in on at for from to into onto with without by as is are was were be being been i you he she it we they me him her them my your our their his its not no yes very too much many some any each every all do does did done have has had'.split(/\s+/)),
      es: new Set('el la los las un una unos unas y o pero si de del al en por para con sin sobre entre que como cuando donde yo tu él ella nosotros vosotros ellos ellas mi tu su mis tus sus nuestro vuestro suyo ser estar haber'.split(/\s+/)),
      de: new Set('der die das ein eine und oder aber wenn dann von zu im in auf mit ohne für aus als ist sind war waren ich du er sie es wir ihr nicht kein sehr viel wenig mein dein sein unser euer ihr'.split(/\s+/)),
      it: new Set('il lo la i gli le un una uno e o ma se di del della dello dei delle in su per con senza tra fra che come quando dove io tu lui lei noi voi loro mio tuo suo nostro vostro essere avere'.split(/\s+/)),
      pt: new Set('o a os as um uma uns umas e ou mas se de do da dos das em no na nos nas por para com sem entre que como quando onde eu tu ele ela nós vós eles elas meu teu seu nosso vosso ser estar ter haver'.split(/\s+/))
    };

    const MASK_TOKEN_BY_MODEL = {
      'Xenova/camembert-base': '<mask>',
      'Xenova/bert-base-cased': '[MASK]',
      'Xenova/bert-base-multilingual-cased': '[MASK]',
    };
    const MODEL_BY_LANG = {
      fr: 'Xenova/camembert-base',
      en: 'Xenova/bert-base-cased',
      default: 'Xenova/bert-base-multilingual-cased'
    };
    const EMBED_MODEL = 'Xenova/multilingual-e5-small';

    const MAX_SEMANTIC_CANDIDATES = 8;
    const MAX_PROGRESS_FPS = 8;
    const FILLMASK_CACHE_LIMIT = 500;

    const I18N = {
      fr: {
        pageTitle: 'Dérive Poétique', langButton: '🇬🇧 EN',
        sourceLabel: 'Texte source', wordsLabel: 'Mots à modifier', distanceLabel: 'Distance sémantique', passesLabel: 'Passes', topkLabel: 'Candidats par masque',
        runBtn: 'Lancer la dérive', cancelBtn: 'Interrompre', warmupBtn: 'Précharger les modèles', diffLabel: 'Surligner les changements',
        autoLangHint: 'La langue est détectée automatiquement. Français → CamemBERT, anglais → BERT cased, autres cas → BERT multilingue.', resultsTitle: 'Résultats',
        distLabels: ['Quasi identique','Très proche','Proche','Voisin','Décalé','Tangentiel','Distant','Très distant','Presque surréaliste','Alien'],
        errorPrefix: 'Erreur :', statusInterrupted: 'Interruption demandée. Les remplacements déjà faits restent affichés.', loadingSemantic: 'Chargement du modèle sémantique…', semanticSub: 'Ce modèle sert à estimer la distance entre le mot original et les candidats.', embedderLoadError: 'Impossible de charger le modèle d’embeddings dans le navigateur.', loadingLanguage: 'Chargement du modèle de langue…', fillMaskLoadError: (m) => `Impossible de charger le modèle ${m}.`, downloadingModels: 'Téléchargement / initialisation des modèles…', warmupNeedText: 'Entre d’abord un texte.',
        warmupReady: (lang, model) => `Modèles prêts : <span class="pill">langue détectée : ${lang}</span><span class="pill">modèle masque : ${model}</span><span class="pill">modèle sémantique : ${EMBED_MODEL}</span>`,
        enterText: 'Entre un texte.', notEnoughWords: 'Le texte ne contient pas assez de mots à transformer.', resultsInfo: (passes, pct, dist, lang, model) => `${passes} passe${passes > 1 ? 's' : ''} · ${pct}% · distance ${dist}/10 · ${lang} · ${model}`,
        preparingModels: 'Préparation des modèles…', passWord: (p, passes, step, total) => `Passe ${p}/${passes} — mot ${step}/${total}`, searchReplacement: (w) => `Recherche d’un remplacement pour « ${w} »`, passNum: (p) => `Passe ${p}`, substitutions: (n) => `${n} substitution${n > 1 ? 's' : ''}`, detailSubstitutions: 'Détail des substitutions', statusDone: (lang, model) => `Terminé. <span class="pill">langue détectée : ${lang}</span><span class="pill">modèle utilisé : ${model}</span><span class="pill">embeddings : ${EMBED_MODEL}</span>`, substitutionLocal: 'substitution locale'
      },
      en: {
        pageTitle: 'Poetic Drift', subtitle: 'browser-only version · models loaded locally', langButton: '🇫🇷 FR',
        sourceLabel: 'Source text', wordsLabel: 'Words to replace', distanceLabel: 'Semantic distance', passesLabel: 'Passes', topkLabel: 'Candidates per mask',
        runBtn: 'Run drift', cancelBtn: 'Cancel', warmupBtn: 'Preload models', diffLabel: 'Highlight changes',
        autoLangHint: 'Language is detected automatically. French → CamemBERT, English → BERT cased, otherwise → multilingual BERT.', resultsTitle: 'Results',
        distLabels: ['Near-identical','Very close','Close','Neighboring','Shifted','Tangential','Distant','Very distant','Nearly surreal','Alien'],
        errorPrefix: 'Error:', statusInterrupted: 'Cancellation requested. Changes already made stay visible.', loadingSemantic: 'Loading semantic model…', semanticSub: 'This model estimates the distance between the original word and the candidates.', embedderLoadError: 'Unable to load the embedding model in the browser.', loadingLanguage: 'Loading language model…', fillMaskLoadError: (m) => `Unable to load model ${m}.`, downloadingModels: 'Downloading / initializing models…', warmupNeedText: 'Enter some text first.',
        warmupReady: (lang, model) => `Models ready: <span class="pill">detected language: ${lang}</span><span class="pill">mask model: ${model}</span><span class="pill">semantic model: ${EMBED_MODEL}</span>`,
        enterText: 'Enter some text.', notEnoughWords: 'The text does not contain enough words to transform.', resultsInfo: (passes, pct, dist, lang, model) => `${passes} pass${passes > 1 ? 'es' : ''} · ${pct}% · distance ${dist}/10 · ${lang} · ${model}`,
        preparingModels: 'Preparing models…', passWord: (p, passes, step, total) => `Pass ${p}/${passes} — word ${step}/${total}`, searchReplacement: (w) => `Searching a replacement for “${w}”`, passNum: (p) => `Pass ${p}`, substitutions: (n) => `${n} substitution${n > 1 ? 's' : ''}`, detailSubstitutions: 'Substitution details', statusDone: (lang, model) => `Done. <span class="pill">detected language: ${lang}</span><span class="pill">model used: ${model}</span><span class="pill">embeddings: ${EMBED_MODEL}</span>`, substitutionLocal: 'local substitution'
      }
    };
    let currentLangUI = 'fr';
    let currentRunId = 0;
    let isRunning = false;

    const ui = {
      poemInput: document.getElementById('poemInput'),
      pctSlider: document.getElementById('pctSlider'),
      distSlider: document.getElementById('distSlider'),
      passSlider: document.getElementById('passSlider'),
      topKSlider: document.getElementById('topKSlider'),
      pctVal: document.getElementById('pctVal'),
      distVal: document.getElementById('distVal'),
      passVal: document.getElementById('passVal'),
      topKVal: document.getElementById('topKVal'),
      runBtn: document.getElementById('runBtn'),
      cancelBtn: document.getElementById('cancelBtn'),
      warmupBtn: document.getElementById('warmupBtn'),
      diffCheck: document.getElementById('diffCheck'),
      progressBox: document.getElementById('progressBox'),
      progressText: document.getElementById('progressText'),
      progressSub: document.getElementById('progressSub'),
      progressBar: document.getElementById('progressBar'),
      errorBox: document.getElementById('errorBox'),
      statusLine: document.getElementById('statusLine'),
      resultsSection: document.getElementById('resultsSection'),
      resultsInfo: document.getElementById('resultsInfo'),
      resultsContainer: document.getElementById('resultsContainer'),
    };

    let cancelFlag = false;
    let allResults = [];
    let currentFillMaskModelId = null;
    let fillMaskPipe = null;
    let embedder = null;
    const embeddingCache = new Map();
    const fillMaskCache = new Map();
    let lastProgressTs = 0;

    function t(key, ...args) { const value = I18N[currentLangUI][key]; return typeof value === 'function' ? value(...args) : value; }
    function applyLanguage() {
      document.documentElement.lang = currentLangUI === 'en' ? 'en' : 'fr';
      document.getElementById('titleText').textContent = t('pageTitle');
      document.getElementById('langToggleBtn').textContent = t('langButton');
      document.getElementById('sourceLabel').textContent = t('sourceLabel');
      document.getElementById('wordsLabel').textContent = t('wordsLabel');
      document.getElementById('distanceLabel').textContent = t('distanceLabel');
      document.getElementById('passesLabel').textContent = t('passesLabel');
      document.getElementById('topkLabel').textContent = t('topkLabel');
      ui.runBtn.textContent = t('runBtn'); ui.cancelBtn.textContent = t('cancelBtn'); ui.warmupBtn.textContent = t('warmupBtn');
      document.getElementById('diffLabel').textContent = t('diffLabel');
      document.getElementById('autoLangHint').textContent = t('autoLangHint');
      document.getElementById('resultsTitle').textContent = t('resultsTitle');
      updateUIValues(); renderResults();
    }
    function isRunActive(runId) { return isRunning && runId === currentRunId && !cancelFlag; }

    function updateUIValues() {
      ui.pctVal.textContent = `${ui.pctSlider.value}%`;
      const d = +ui.distSlider.value;
      const labels = I18N[currentLangUI].distLabels || DIST_LABELS;
      ui.distVal.innerHTML = `${d}/10 — <em>${labels[d - 1]}</em>`;
      ui.passVal.textContent = ui.passSlider.value;
      ui.topKVal.textContent = ui.topKSlider.value;
    }
    updateUIValues();
    for (const el of [ui.pctSlider, ui.distSlider, ui.passSlider, ui.topKSlider]) {
      el.addEventListener('input', updateUIValues);
    }

    function showError(message) {
      ui.errorBox.innerHTML = `<strong>${escapeHtml(t('errorPrefix'))}</strong> ${escapeHtml(message)}`;
      ui.errorBox.style.display = 'block';
    }
    function clearError() {
      ui.errorBox.style.display = 'none';
      ui.errorBox.textContent = '';
    }
    function showStatus(message) {
      ui.statusLine.innerHTML = message;
      ui.statusLine.style.display = 'block';
    }
    function hideStatus() {
      ui.statusLine.style.display = 'none';
      ui.statusLine.textContent = '';
    }
    function showProgress(text, percent = null, sub = '', force = false) {
      const now = performance.now();
      if (!force && now - lastProgressTs < 1000 / MAX_PROGRESS_FPS) return;
      lastProgressTs = now;
      ui.progressBox.style.display = 'block';
      ui.progressText.textContent = text;
      ui.progressSub.textContent = sub || '';
      ui.progressBar.style.width = percent == null ? '0%' : `${Math.max(0, Math.min(100, percent))}%`;
    }
    function hideProgress() {
      ui.progressBox.style.display = 'none';
      ui.progressBar.style.width = '0%';
      ui.progressText.textContent = '';
      ui.progressSub.textContent = '';
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function cosine(a, b) {
      let dot = 0, na = 0, nb = 0;
      const n = Math.min(a.length, b.length);
      for (let i = 0; i < n; i++) {
        dot += a[i] * b[i];
        na += a[i] * a[i];
        nb += b[i] * b[i];
      }
      if (!na || !nb) return 0;
      return dot / (Math.sqrt(na) * Math.sqrt(nb));
    }

    function mapDistanceToTargetSimilarity(distance) {
      const t = (distance - 1) / 9;
      return 0.92 - t * 0.72;
    }

    function preserveCase(original, replacement) {
      if (original.toUpperCase() === original) return replacement.toUpperCase();
      if (original[0] && original[0].toUpperCase() === original[0] && original.slice(1).toLowerCase() === original.slice(1)) {
        return replacement.charAt(0).toUpperCase() + replacement.slice(1);
      }
      return replacement;
    }

    function stripAccents(text) {
      return text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function detectLanguage(text) {
      const words = (text.toLowerCase().match(/\p{L}+/gu) || []).slice(0, 500);
      if (!words.length) return { lang: 'unknown', confidence: 0 };

      const scores = {};
      for (const [lang, set] of Object.entries(STOPWORDS)) {
        let score = 0;
        for (const w of words) if (set.has(w)) score += 1;
        scores[lang] = score;
      }

      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      let [bestLang, bestScore] = sorted[0];
      const secondScore = sorted[1]?.[1] || 0;

      const lowered = text.toLowerCase();
      if (bestScore <= 1) {
        if (/[àâçéèêëîïôûùüÿœæ]/i.test(lowered)) bestLang = 'fr';
        else if (/[ñ¿¡]/i.test(lowered)) bestLang = 'es';
        else if (/[ßäöü]/i.test(lowered)) bestLang = 'de';
        else if (/[ãõ]/i.test(lowered)) bestLang = 'pt';
        else bestLang = 'unknown';
      }

      const confidence = bestScore === 0 ? 0.2 : Math.min(0.98, 0.45 + (bestScore - secondScore) / Math.max(4, words.length * 0.08));
      return { lang: bestLang, confidence };
    }

    function chooseFillMaskModel(lang) {
      return MODEL_BY_LANG[lang] || MODEL_BY_LANG.default;
    }

    function isWordToken(token) {
      return /^\p{L}+(?:[’']\p{L}+)*$/u.test(token);
    }

    function tokenize(text) {
      const parts = text.match(/\s+|\p{L}+(?:[’']\p{L}+)*|[^\s\p{L}]+/gu) || [];
      return parts.map((value, index) => ({ value, index, kind: isWordToken(value) ? 'word' : /^\s+$/u.test(value) ? 'space' : 'punct' }));
    }

    function untokenize(tokens) {
      return tokens.map(t => t.value).join('');
    }

    function isLikelyProperNoun(tokens, idx) {
      const token = tokens[idx]?.value || '';
      if (!isWordToken(token)) return false;
      const startsUpper = token[0] === token[0].toUpperCase() && token[0] !== token[0].toLowerCase();
      if (!startsUpper) return false;
      if (idx === 0) return true;

      for (let i = idx - 1; i >= 0; i--) {
        if (tokens[i].kind === 'space') continue;
        return /[\.\!\?\n:;]/.test(tokens[i].value) ? false : true;
      }
      return true;
    }

    function isContentWord(token, lang, tokens, idx) {
      const raw = token.value;
      const word = raw.toLowerCase();
      if (!isWordToken(raw)) return false;
      if (word.length < 3) return false;
      if ((STOPWORDS[lang] || STOPWORDS.fr).has(word)) return false;
      if (isLikelyProperNoun(tokens, idx)) return false;
      return true;
    }

    function shuffled(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function selectTargetIndices(tokens, pct, lang) {
      const candidates = [];
      for (let i = 0; i < tokens.length; i++) {
        if (tokens[i].kind === 'word' && isContentWord(tokens[i], lang, tokens, i)) {
          candidates.push(i);
        }
      }
      const wanted = Math.max(1, Math.round(candidates.length * pct / 100));
      return shuffled(candidates).slice(0, wanted).sort((a, b) => a - b);
    }

    async function getEmbedder() {
      if (embedder) return embedder;
      showProgress(t('loadingSemantic'), 8, t('semanticSub'), true);
      try {
        embedder = await pipeline('feature-extraction', EMBED_MODEL, {
          progress_callback: reportModelProgress,
        });
      } catch (err) {
        console.error(err);
        throw new Error(t('embedderLoadError'));
      }
      return embedder;
    }

    async function getFillMaskPipeline(modelId) {
      if (fillMaskPipe && currentFillMaskModelId === modelId) return fillMaskPipe;
      showProgress(t('loadingLanguage'), 5, modelId, true);
      try {
        fillMaskPipe = await pipeline('fill-mask', modelId, {
          progress_callback: reportModelProgress,
        });
        currentFillMaskModelId = modelId;
      } catch (err) {
        console.error(err);
        throw new Error(t('fillMaskLoadError', modelId));
      }
      return fillMaskPipe;
    }

    function reportModelProgress(event) {
      if (!event) return;
      const loaded = Number(event.loaded || 0);
      const total = Number(event.total || 0);
      const percent = total > 0 ? Math.round((loaded / total) * 100) : null;
      const file = event.file || event.name || 'modèle';
      showProgress(t('downloadingModels'), percent, `${file}${percent != null ? ` · ${percent}%` : ''}`, true);
    }

    function getFillMaskCacheKey(modelId, maskedText, topK) {
      return `${modelId}__${topK}__${maskedText}`;
    }

    function setFillMaskCache(key, value) {
      if (fillMaskCache.size >= FILLMASK_CACHE_LIMIT) {
        const firstKey = fillMaskCache.keys().next().value;
        if (firstKey !== undefined) fillMaskCache.delete(firstKey);
      }
      fillMaskCache.set(key, value);
    }

    async function getFillMaskCandidates(maskedText, modelId, topK) {
      const cacheKey = getFillMaskCacheKey(modelId, maskedText, topK);
      if (fillMaskCache.has(cacheKey)) return fillMaskCache.get(cacheKey);
      const unmasker = await getFillMaskPipeline(modelId);
      const output = await unmasker(maskedText, { top_k: topK });
      const candidates = Array.isArray(output) ? output : [output];
      setFillMaskCache(cacheKey, candidates);
      return candidates;
    }

    function preselectCandidates(candidates, originalWord, lang) {
      const originalLower = originalWord.toLowerCase();
      const stopset = STOPWORDS[lang] || STOPWORDS.fr;
      const filtered = [];
      for (let i = 0; i < candidates.length; i++) {
        const cand = candidates[i];
        const token = cleanCandidate(cand.token_str || '');
        if (!token) continue;
        if (!isWordToken(token)) continue;
        if (token.toLowerCase() === originalLower) continue;
        if (stopset.has(token.toLowerCase())) continue;
        if (token.length < 2) continue;
        const lexical = lexicalPenalty(originalWord, token);
        if (lexical >= 1) continue;
        const contextual = Math.max(0, Math.min(1, Number(cand.score || 0)));
        const morphology = formScore(originalWord, token);
        const quickScore = contextual * 0.78 + morphology * 0.18 + (1 - lexical) * 0.04;
        filtered.push({ token, cand, contextual, morphology, lexical, quickScore, rank: i + 1 });
      }
      filtered.sort((a, b) => b.quickScore - a.quickScore);
      return filtered.slice(0, Math.min(MAX_SEMANTIC_CANDIDATES, filtered.length));
    }

    async function getWordEmbedding(word) {
      const key = stripAccents(word.trim().toLowerCase());
      if (!key) return null;
      if (embeddingCache.has(key)) return embeddingCache.get(key);
      const extractor = await getEmbedder();
      const output = await extractor(key, { pooling: 'mean', normalize: true });
      const arr = Array.from(output.data || output);
      embeddingCache.set(key, arr);
      return arr;
    }

    function cleanCandidate(raw) {
      if (raw == null) return '';
      let s = String(raw).trim();
      s = s.replace(/^▁+/, '').replace(/^Ġ+/, '').trim();
      return s;
    }

    function lexicalPenalty(original, candidate) {
      const a = stripAccents(original.toLowerCase());
      const b = stripAccents(candidate.toLowerCase());
      if (a === b) return 1;
      if (a.startsWith(b) || b.startsWith(a)) return 0.35;
      return 0;
    }

    function formScore(original, candidate) {
      const lenDiff = Math.abs(original.length - candidate.length);
      const accentlessMatch = stripAccents(original.toLowerCase()) === stripAccents(candidate.toLowerCase());
      const startMatch = original[0]?.toLowerCase() === candidate[0]?.toLowerCase();
      let score = 1 - Math.min(lenDiff, 8) / 8;
      if (accentlessMatch) score -= 0.8;
      if (startMatch) score += 0.05;
      return Math.max(0, Math.min(1, score));
    }

    async function chooseReplacement(maskedText, originalWord, distance, topK, lang, modelId) {
      const candidates = await getFillMaskCandidates(maskedText, modelId, topK);
      const shortlisted = preselectCandidates(candidates, originalWord, lang);
      if (!shortlisted.length) return null;

      const targetSimilarity = mapDistanceToTargetSimilarity(distance);
      const embOriginal = await getWordEmbedding(originalWord);
      const rescored = [];

      for (let i = 0; i < shortlisted.length; i++) {
        const item = shortlisted[i];
        let similarity = 0.5;
        try {
          const embCandidate = await getWordEmbedding(item.token);
          similarity = embOriginal && embCandidate ? cosine(embOriginal, embCandidate) : 0.5;
        } catch {
          similarity = 0.5;
        }

        const semanticFit = 1 - Math.min(1, Math.abs(similarity - targetSimilarity) / 0.9);
        const originality = 1 - item.lexical;
        const finalScore = item.contextual * 0.58 + semanticFit * 0.28 + originality * 0.08 + item.morphology * 0.06;
        rescored.push({
          replacement: item.token,
          contextual: item.contextual,
          similarity,
          semanticFit,
          finalScore,
          raw: item.cand,
          rank: item.rank,
        });
      }

      rescored.sort((a, b) => b.finalScore - a.finalScore);
      return rescored[0] || null;
    }

    function getMaskToken(modelId) {
      return MASK_TOKEN_BY_MODEL[modelId] || '[MASK]';
    }

    function makeMaskedText(tokens, targetIndex, modelId) {
      const maskToken = getMaskToken(modelId);
      return tokens.map((t, idx) => idx === targetIndex ? maskToken : t.value).join('');
    }

    function highlightPoem(poem, changes, showDiff) {
      if (!showDiff || !changes.length) return escapeHtml(poem).replace(/\n/g, '<br>');
      const safeChanges = [...changes].sort((a, b) => b.start - a.start);
      let html = poem;
      for (const ch of safeChanges) {
        html = html.slice(0, ch.start)
          + `__MARK_START__${html.slice(ch.start, ch.end)}__MARK_END__`
          + html.slice(ch.end);
      }
      return escapeHtml(html)
        .replace(/__MARK_START__/g, `<span class="cw" title="${escapeHtml(t('substitutionLocal'))}">`)
        .replace(/__MARK_END__/g, '</span>')
        .replace(/\n/g, '<br>');
    }

    function renderResults() {
      const showDiff = ui.diffCheck.checked;
      ui.resultsContainer.innerHTML = allResults.map(r => {
        const poemHtml = highlightPoem(r.poem, r.changes, showDiff);
        const changesHtml = r.changes.map(c => `
          <div class="change-item">
            <span class="ch-orig">${escapeHtml(c.original)}</span>
            <span class="ch-arrow">→</span>
            <span class="ch-repl">${escapeHtml(c.replacement)}</span>
          </div>
        `).join('');
        return `
          <div class="pass-card">
            <div class="pass-head">
              <span class="pass-num">${t('passNum', r.pass)}</span>
              <span class="pass-meta">${t('substitutions', r.changes.length)}</span>
            </div>
            <div class="poem-out">${poemHtml}</div>
            ${r.changes.length ? `
              <details>
                <summary>${t('detailSubstitutions')}</summary>
                <div class="changes-grid">${changesHtml}</div>
              </details>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    async function warmup() {
      clearError();
      hideStatus();
      const text = ui.poemInput.value.trim();
      if (!text) return showError(t('warmupNeedText'));
      const det = detectLanguage(text);
      const lang = det.lang === 'unknown' ? 'fr' : det.lang;
      const modelId = chooseFillMaskModel(lang);
      ui.warmupBtn.disabled = true;
      try {
        await Promise.all([
          getFillMaskPipeline(modelId),
          getEmbedder(),
        ]);
        hideProgress();
        showStatus(t('warmupReady', escapeHtml(LANGUAGE_LABELS[det.lang] || det.lang), escapeHtml(modelId)));
      } catch (err) {
        showError(err.message || String(err));
      } finally {
        ui.warmupBtn.disabled = false;
      }
    }

    async function runDrift() {
      const myRunId = ++currentRunId;
      clearError();
      hideStatus();
      cancelFlag = false;
      isRunning = true;

      const input = ui.poemInput.value;
      const text = input.trim();
      const pct = +ui.pctSlider.value;
      const dist = +ui.distSlider.value;
      const passes = +ui.passSlider.value;
      const topK = +ui.topKSlider.value;

      if (!text) { isRunning = false; return showError(t('enterText')); }
      if (!text.match(/\p{L}/u)) { isRunning = false; return showError(t('notEnoughWords')); }

      ui.runBtn.classList.add('hidden');
      ui.cancelBtn.classList.remove('hidden');
      ui.warmupBtn.disabled = true;
      ui.resultsSection.classList.remove('hidden');
      ui.resultsContainer.innerHTML = '';
      allResults = [];

      try {
        const detection = detectLanguage(text);
        const lang = detection.lang === 'unknown' ? 'fr' : detection.lang;
        const modelId = chooseFillMaskModel(lang);
        ui.resultsInfo.textContent = t('resultsInfo', passes, pct, dist, LANGUAGE_LABELS[detection.lang] || detection.lang, modelId);

        showProgress(t('preparingModels'), 2, `${LANGUAGE_LABELS[detection.lang] || detection.lang} → ${modelId}`, true);
        await Promise.all([getFillMaskPipeline(modelId), getEmbedder()]);
        if (!isRunActive(myRunId)) throw new Error('__cancelled__');

        let currentText = text;
        for (let p = 0; p < passes; p++) {
          if (!isRunActive(myRunId)) break;
          let tokens = tokenize(currentText);
          const targetIndices = selectTargetIndices(tokens, pct, lang);
          const changes = [];
          if (!targetIndices.length) { allResults.push({ pass: p + 1, poem: currentText, changes: [] }); continue; }

          for (let step = 0; step < targetIndices.length; step++) {
            if (!isRunActive(myRunId)) break;
            const idx = targetIndices[step];
            const token = tokens[idx];
            if (!token || token.kind !== 'word') continue;
            if (!isContentWord(token, lang, tokens, idx)) continue;
            const maskedText = makeMaskedText(tokens, idx, modelId);
            const progressBase = ((p + step / Math.max(1, targetIndices.length)) / passes) * 100;
            showProgress(t('passWord', p + 1, passes, step + 1, targetIndices.length), progressBase, t('searchReplacement', token.value));
            const choice = await chooseReplacement(maskedText, token.value, dist, topK, lang, modelId);
            if (!isRunActive(myRunId)) break;
            if (!choice) continue;
            const replacement = preserveCase(token.value, choice.replacement);
            if (replacement === token.value) continue;
            const oldValue = tokens[idx].value;
            const start = computeCharStart(tokens, idx);
            tokens[idx].value = replacement;
            const end = start + replacement.length;
            changes.push({ index: idx, original: oldValue, replacement, start, end, contextual: choice.contextual, similarity: choice.similarity });
          }

          currentText = untokenize(tokens);
          allResults.push({ pass: p + 1, poem: currentText, changes });
          renderResults();
        }

        if (myRunId === currentRunId && !cancelFlag) {
          hideProgress();
          showStatus(t('statusDone', escapeHtml(LANGUAGE_LABELS[detection.lang] || detection.lang), escapeHtml(currentFillMaskModelId || chooseFillMaskModel(detection.lang === 'unknown' ? 'fr' : detection.lang))));
        }
      } catch (err) {
        if (err?.message !== '__cancelled__' && myRunId === currentRunId && !cancelFlag) {
          console.error(err);
          showError(err?.message || String(err));
        }
      } finally {
        if (myRunId === currentRunId) {
          hideProgress();
          ui.runBtn.classList.remove('hidden');
          ui.cancelBtn.classList.add('hidden');
          ui.warmupBtn.disabled = false;
          isRunning = false;
        }
      }
    }

    function computeCharStart(tokens, targetIndex) {
      let total = 0;
      for (let i = 0; i < targetIndex; i++) total += tokens[i].value.length;
      return total;
    }

    ui.diffCheck.addEventListener('change', renderResults);
    ui.runBtn.addEventListener('click', runDrift);
    ui.warmupBtn.addEventListener('click', warmup);
    ui.cancelBtn.addEventListener('click', () => {
      cancelFlag = true;
      currentRunId += 1;
      isRunning = false;
      hideProgress();
      showStatus(t('statusInterrupted'));
      ui.runBtn.classList.remove('hidden');
      ui.cancelBtn.classList.add('hidden');
      ui.warmupBtn.disabled = false;
    });
    document.getElementById('langToggleBtn').addEventListener('click', () => {
      currentLangUI = currentLangUI === 'fr' ? 'en' : 'fr';
      applyLanguage();
    });
    applyLanguage();
  </script>
</body>
</html>
